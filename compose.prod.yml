services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: platekeeper
      POSTGRES_USER: platekeeper
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U platekeeper"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  api:
    image: ghcr.io/michalkulesza/carrot-api:latest
    env_file: .env
    environment:
      R2_ENDPOINT_URL: ${R2_ENDPOINT_URL:-}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID:-}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY:-}
      R2_BUCKET_NAME: ${R2_BUCKET_NAME:-}
      R2_PUBLIC_URL: ${R2_PUBLIC_URL:-}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "127.0.0.1:8088:8000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/healthz').status==200 else 1)\""]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    image: ghcr.io/michalkulesza/carrot-web:latest
    ports:
      - "127.0.0.1:8089:80"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:80/ >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  showcase:
    image: ghcr.io/michalkulesza/carrot-showcase:latest
    ports:
      - "127.0.0.1:8090:80"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:80/ >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    name: platekeeper_postgres_data
