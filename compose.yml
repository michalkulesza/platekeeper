services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: platekeeper
      POSTGRES_USER: platekeeper
      POSTGRES_PASSWORD: platekeeper
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U platekeeper"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
